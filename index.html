<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>패링 마스터 (Parrying Master) - Special Edition</title>
    <style>
        :root {
            --bg-color: #08080a;
            --panel-color: #12121a;
            --accent-color: #ff2a2a;
            --gold-color: #ffd700;
            --parry-color: #00ffcc;
            --perfect-color: #ffffff; 
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color); color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #game-container {
            position: relative; width: 800px;
            background: var(--panel-color); border: 4px solid #2d2d3d; border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            max-width: 100vw;
        }

        #lobby-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 8, 10, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: 12px; padding: 20px; box-sizing: border-box;
        }

        .title {
            font-size: 40px; font-weight: 900; color: var(--gold-color); margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7); letter-spacing: 3px;
        }

        .skin-container { display: flex; gap: 15px; margin: 15px 0; }
        .skin-card {
            width: 140px; padding: 12px 5px; background: #1a1a26; border: 3px solid #333344;
            border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s ease;
        }
        .skin-card.selected {
            border-color: var(--gold-color); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.05); background: #222235;
        }
        .skin-preview-box { width: 50px; height: 50px; margin: 10px auto; background: #0b0b10; border-radius: 6px; border: 1px solid #444; }

        .guide-panel { background: #151522; border: 2px solid #2d2d3d; border-radius: 10px; padding: 12px 20px; margin-bottom: 15px; width: 85%; font-size: 13px; line-height: 1.6; }
        .guide-title { color: var(--parry-color); font-weight: bold; margin-bottom: 6px; text-align: center; font-size: 14px; }
        .guide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 20px; }
        .guide-item span { color: var(--gold-color); font-weight: bold; }

        .btn-start {
            padding: 12px 45px; font-size: 20px; background: linear-gradient(135deg, #ff2a2a, #990000);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 6px 15px rgba(255,42,42,0.4); transition: transform 0.1s;
        }
